<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Internship Hours Tracker</title>
    <meta
      name="description"
      content="A personal static internship hour tracker with calendar logging and finish-date forecasting."
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Personal Internship Log</p>
          <h1>Internship Tracker</h1>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="exportBtn" type="button" title="Export data" aria-label="Export data">
            <i data-lucide="download"></i>
          </button>
          <label class="icon-button file-button" title="Import data" aria-label="Import data">
            <i data-lucide="upload"></i>
            <input id="importInput" type="file" accept="application/json" />
          </label>
        </div>
      </header>

      <section class="hero-band" aria-label="Progress summary">
        <div class="hero-copy">
          <span class="status-pill" id="paceLabel">Tracking</span>
          <h2 id="finishHeadline">Finish date pending</h2>
          <p id="finishDetail">Log a duty day to start the forecast.</p>
        </div>
        <div class="progress-orbit" aria-label="Completion progress">
          <svg viewBox="0 0 140 140" role="img">
            <circle class="track" cx="70" cy="70" r="58"></circle>
            <circle class="meter" id="progressCircle" cx="70" cy="70" r="58"></circle>
          </svg>
          <div class="progress-number">
            <strong id="progressPercent">0%</strong>
            <span id="progressHours">0 / 320h</span>
          </div>
        </div>
      </section>

      <section class="stats-grid" aria-label="Hour totals">
        <article class="stat-card">
          <span>Logged</span>
          <strong id="loggedHours">0h</strong>
        </article>
        <article class="stat-card">
          <span>Remaining</span>
          <strong id="remainingHours">320h</strong>
        </article>
        <article class="stat-card">
          <span>Duty Days</span>
          <strong id="dutyDays">0</strong>
        </article>
        <article class="stat-card">
          <span>Average</span>
          <strong id="averageHours">0h</strong>
        </article>
      </section>

      <section class="workspace">
        <aside class="side-panel" aria-label="Controls">
          <section class="panel-block">
            <div class="panel-heading">
              <h2>Profile</h2>
              <button class="icon-button small" id="deleteProfileBtn" type="button" title="Delete profile" aria-label="Delete profile">
                <i data-lucide="trash-2"></i>
              </button>
            </div>
            <select id="profileSelect" class="profile-select" aria-label="Choose profile"></select>
            <label class="field-label" for="profileNameInput">Profile Name</label>
            <div class="number-row">
              <input id="profileNameInput" type="text" maxlength="40" placeholder="Profile name" />
              <button id="saveProfileNameBtn" class="solid-button" type="button">Save</button>
            </div>
            <button id="newProfileBtn" class="wide-button" type="button">
              <i data-lucide="plus"></i>
              <span>New Profile</span>
            </button>
          </section>

          <section class="panel-block">
            <h2>Selected Date</h2>
            <input id="selectedDateInput" type="date" />
            <div class="quick-grid" aria-label="Hour presets">
              <button class="quick-btn" type="button" data-hours="4">4h</button>
              <button class="quick-btn" type="button" data-hours="8">8h</button>
              <button class="quick-btn ghost" type="button" data-hours="0">Clear</button>
            </div>
            <label class="field-label" for="customHoursInput">Custom Hours</label>
            <div class="number-row">
              <input id="customHoursInput" type="number" min="0" max="24" step="0.25" inputmode="decimal" />
              <button id="saveCustomBtn" class="solid-button" type="button">Save</button>
            </div>
            <label class="toggle-row">
              <input id="offDayToggle" type="checkbox" />
              <span>No duty</span>
            </label>
          </section>

          <section class="panel-block">
            <h2>Plan</h2>
            <label class="field-label" for="goalInput">Goal Hours</label>
            <input id="goalInput" type="number" min="1" step="1" />
            <label class="field-label" for="startInput">Start Date</label>
            <input id="startInput" type="date" />
            <label class="field-label" for="plannedHoursInput">Forecast Hours</label>
            <input id="plannedHoursInput" type="number" min="0.25" max="24" step="0.25" />
            <div class="weekday-picker" aria-label="Duty weekdays">
              <label><input type="checkbox" data-weekday="1" /> Mon</label>
              <label><input type="checkbox" data-weekday="2" /> Tue</label>
              <label><input type="checkbox" data-weekday="3" /> Wed</label>
              <label><input type="checkbox" data-weekday="4" /> Thu</label>
              <label><input type="checkbox" data-weekday="5" /> Fri</label>
              <label><input type="checkbox" data-weekday="6" /> Sat</label>
              <label><input type="checkbox" data-weekday="0" /> Sun</label>
            </div>
          </section>

          <section class="panel-block">
            <div class="panel-heading">
              <h2>No Duty</h2>
              <button class="icon-button small" id="clearOffDaysBtn" type="button" title="Clear no-duty dates" aria-label="Clear no-duty dates">
                <i data-lucide="eraser"></i>
              </button>
            </div>
            <div id="offDayList" class="tag-list"></div>
          </section>

          <section class="panel-block">
            <div class="panel-heading">
              <h2>Data</h2>
            <button class="icon-button small" id="resetBtn" type="button" title="Reset tracker" aria-label="Reset tracker">
                <i data-lucide="rotate-ccw"></i>
              </button>
            </div>
            <p class="storage-note">Each profile is saved in this browser.</p>
          </section>
        </aside>

        <section class="calendar-panel" aria-label="Calendar">
          <div class="calendar-toolbar">
            <button class="icon-button" id="prevMonthBtn" type="button" title="Previous month" aria-label="Previous month">
              <i data-lucide="chevron-left"></i>
            </button>
            <button class="month-title" id="todayBtn" type="button"></button>
            <button class="icon-button" id="nextMonthBtn" type="button" title="Next month" aria-label="Next month">
              <i data-lucide="chevron-right"></i>
            </button>
          </div>
          <div class="weekday-row" aria-hidden="true">
            <span>Sun</span>
            <span>Mon</span>
            <span>Tue</span>
            <span>Wed</span>
            <span>Thu</span>
            <span>Fri</span>
            <span>Sat</span>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </section>
      </section>
    </main>
  </body>
</html>
